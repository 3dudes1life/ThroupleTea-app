<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="theme-color" content="#000000">
  <title>A Little Throuple Tea Player</title>
  <style>
    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0;background:#000;overflow:hidden}
    body{display:flex;align-items:center;justify-content:center}
    #player{width:100%;height:100%;border:0;background:#000}
    body.short #player{max-width:560px}
    .error{font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:#fff;text-align:center;padding:24px}
  </style>
</head>
<body>
  <div id="error" class="error" hidden>That video could not be loaded.</div>
  <script>
    (() => {
      const params = new URLSearchParams(location.search);
      const id = (params.get('v') || '').replace(/[^A-Za-z0-9_-]/g, '');
      const kind = params.get('kind') === 'short' ? 'short' : 'episode';
      if (kind === 'short') document.body.classList.add('short');
      if (!id) {
        document.getElementById('error').hidden = false;
        return;
      }

      const iframe = document.createElement('iframe');
      iframe.id = 'player';
      iframe.title = params.get('title') || 'A Little Throuple Tea video';
      iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share; fullscreen';
      iframe.allowFullscreen = true;
      iframe.referrerPolicy = 'strict-origin-when-cross-origin';

      const embed = new URL(`https://www.youtube-nocookie.com/embed/${id}`);
      embed.searchParams.set('autoplay', '1');
      embed.searchParams.set('playsinline', '1');
      embed.searchParams.set('rel', '0');
      embed.searchParams.set('enablejsapi', '1');
      embed.searchParams.set('origin', location.origin);
      embed.searchParams.set('widget_referrer', location.href);
      iframe.src = embed.toString();

      document.body.appendChild(iframe);
    })();
  </script>
</body>
</html>
